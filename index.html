<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My To-Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #fdf6ee;
      --card:     #ffffff;
      --accent:   #c0392b;
      --accent-h: #a93226;
      --text:     #1a1a1a;
      --muted:    #888;
      --done-bg:  #f4f4f4;
      --done-txt: #aaa;
      --border:   #e8e0d6;
      --shadow:   0 4px 24px rgba(0,0,0,0.08);
      --radius:   12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--accent);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .header p { margin-top: 6px; color: var(--muted); font-size: 0.95rem; }
    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      width: 100%;
      max-width: 520px;
    }
    .input-row { display: flex; gap: 10px; margin-bottom: 24px; }
    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.97rem;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input::placeholder { color: var(--muted); }
    .input-row input:focus { border-color: var(--accent); }
    .btn-add {
      padding: 12px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.97rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--accent-h); }
    .btn-add:active { transform: scale(0.96); }
    .filters { display: flex; gap: 6px; margin-bottom: 20px; }
    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: transparent;
      font-family: inherit;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { color: var(--text); border-color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    #task-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      transition: box-shadow 0.2s, background 0.2s;
      animation: slideIn 0.25s ease;
    }
    .task-item:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .task-item.done { background: var(--done-bg); border-color: transparent; }
    .task-check { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .task-text { flex: 1; font-size: 0.97rem; word-break: break-word; transition: color 0.2s, text-decoration 0.2s; }
    .task-item.done .task-text { color: var(--done-txt); text-decoration: line-through; }
    .btn-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
      opacity: 0;
      transition: color 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    .task-item:hover .btn-delete { opacity: 1; }
    .btn-delete:hover { color: var(--accent); }
    .empty { text-align: center; padding: 32px 0; color: var(--muted); font-size: 0.9rem; }
    .empty span { display: block; font-size: 2.5rem; margin-bottom: 8px; }
    .footer { margin-top: 20px; font-size: 0.82rem; color: var(--muted); text-align: right; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 400px) { .card { padding: 20px 16px; } }
  </style>
</head>
<body>

  <header class="header">
    <h1>My To-Do List</h1>
    <p>Stay on top of your day.</p>
  </header>

  <main class="card">
    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add a new task..." maxlength="120" aria-label="New task">
      <button class="btn-add" id="add-btn">+ Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="done">Completed</button>
    </div>

    <ul id="task-list" aria-label="Task list" aria-live="polite"></ul>
    <p class="footer" id="task-count"></p>
  </main>

  <script>
    var tasks = [];
    var currentFilter = 'all';

    var taskInput  = document.getElementById('task-input');
    var addBtn     = document.getElementById('add-btn');
    var taskList   = document.getElementById('task-list');
    var taskCount  = document.getElementById('task-count');
    var filterBtns = document.querySelectorAll('.filter-btn');

    function addTask() {
      var text = taskInput.value.trim();
      if (!text) return;
      tasks.push({ id: Date.now(), text: text, done: false });
      taskInput.value = '';
      taskInput.focus();
      render();
    }

    function toggleTask(id) {
      tasks = tasks.map(function(t) {
        return t.id === id ? { id: t.id, text: t.text, done: !t.done } : t;
      });
      render();
    }

    function deleteTask(id) {
      tasks = tasks.filter(function(t) { return t.id !== id; });
      render();
    }

    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function render() {
      var visible = tasks.filter(function(t) {
        if (currentFilter === 'active') return !t.done;
        if (currentFilter === 'done')   return  t.done;
        return true;
      });

      if (visible.length === 0) {
        taskList.innerHTML =
          '<li class="empty"><span>&#x2705;</span>' +
          (tasks.length === 0 ? 'No tasks yet - add one above!' : 'Nothing here.') +
          '</li>';
      } else {
        var html = '';
        for (var i = 0; i < visible.length; i++) {
          var t = visible[i];
          html +=
            '<li class="task-item ' + (t.done ? 'done' : '') + '" data-id="' + t.id + '">' +
              '<input type="checkbox" class="task-check" ' + (t.done ? 'checked' : '') + '>' +
              '<span class="task-text">' + escapeHTML(t.text) + '</span>' +
              '<button class="btn-delete">&#x2715;</button>' +
            '</li>';
        }
        taskList.innerHTML = html;
      }

      taskList.querySelectorAll('.task-check').forEach(function(cb) {
        cb.addEventListener('change', function() {
          toggleTask(+cb.closest('.task-item').dataset.id);
        });
      });

      taskList.querySelectorAll('.btn-delete').forEach(function(btn) {
        btn.addEventListener('click', function() {
          deleteTask(+btn.closest('.task-item').dataset.id);
        });
      });

      var remaining = tasks.filter(function(t) { return !t.done; }).length;
      taskCount.textContent = tasks.length === 0
        ? ''
        : remaining + ' task' + (remaining !== 1 ? 's' : '') + ' remaining';
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addTask();
    });
    filterBtns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        currentFilter = btn.dataset.filter;
        filterBtns.forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        render();
      });
    });

    render();
  </script>

</body>
</html>
